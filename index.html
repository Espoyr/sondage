<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire citoyen — ASBL Espoyr</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#F0EDE6;font-family:'DM Sans',sans-serif;color:#2D4A3E}
.fade-in{animation:fadeIn .3s ease forwards}
.fade-out{animation:fadeOut .25s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes highlightFade{0%{background:#E8F5E9}100%{background:transparent}}

.header{background:linear-gradient(135deg,#2A614E,#1B4332);padding:20px 16px 14px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.15)}
.header-inner{max-width:460px;margin:0 auto}
.header h1{font-family:'Fraunces',serif;font-size:17px;font-weight:700}
.header .sub{font-size:11px;opacity:.7;margin-top:2px}
.progress-bar{margin-top:10px}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;opacity:.65;margin-bottom:3px}
.progress-track{height:4px;background:rgba(255,255,255,.2);border-radius:2px}
.progress-fill{height:100%;background:#A7D7C5;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.content{max-width:460px;margin:0 auto;padding:20px 12px 70px}
.card{background:#fff;border-radius:14px;padding:24px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:16px}
.card h2{font-family:'Fraunces',serif;font-size:18px;color:#1B4332;margin-bottom:4px}
.card .subtitle{color:#8B9D93;font-size:12px;margin-top:4px}

.btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;transition:all .2s;border:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(42,97,78,.25)}
.btn-primary{background:#2A614E;color:#fff}
.btn-secondary{background:#fff;color:#2A614E;border:2px solid #2A614E}
.btn-submit{background:linear-gradient(135deg,#2A614E,#1B4332);color:#fff}
.btn-row{display:flex;gap:10px}

.section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.speak-btn{width:34px;height:34px;border-radius:50%;border:2px solid #2A614E;background:#F0FAF4;color:#2A614E;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.speak-btn:hover{background:#2A614E;color:#fff}
.speak-btn.active{background:#2A614E;color:#fff}
.speak-btn.speaking{background:#E74C3C;border-color:#E74C3C;color:#fff;animation:pulse 1.5s infinite}

.field-label{font-size:13px;font-weight:600;color:#2D4A3E;display:block;margin-bottom:6px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:8px;border:2px solid #DDD8CE;background:#fff;color:#555;font-weight:400;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.chip.active{border-color:#2A614E;background:#F0FAF4;color:#2A614E;font-weight:600}
.chip-sm{font-size:12px;padding:6px 12px}
.text-input{width:100%;padding:8px 12px;border-radius:8px;border:2px solid #DDD8CE;font-size:13px;font-family:'DM Sans',sans-serif;background:#FAFAF8}
.text-input:focus{outline:none;border-color:#2A614E;box-shadow:0 0 0 3px rgba(42,97,78,.1)}

.likert-item{padding:12px 10px;border-radius:10px;margin-bottom:5px;transition:all .3s ease;scroll-margin-top:120px}
.likert-item:nth-child(odd){background:#FAFAF8}
.likert-item:hover{background:#F7F5F0}
.likert-item.current{box-shadow:0 0 0 2px #2A614E;background:#F0FAF4}
.likert-top{display:flex;align-items:flex-start;gap:6px}
.likert-text{font-size:13px;color:#2D4A3E;margin-bottom:8px;line-height:1.45;font-weight:500;flex:1}
.skip-btn{width:28px;height:28px;border-radius:50%;border:1px solid #CCC;background:#fff;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:-2px}
.skip-btn:hover{background:#2A614E;color:#fff;border-color:#2A614E}
.likert-scale{display:flex;justify-content:space-between;align-items:center;gap:2px}
.scale-label{font-size:11px;color:#888;flex-shrink:0;width:32px;font-weight:600}
.scale-label-r{text-align:right}
.dots{display:flex;gap:6px;flex:1;justify-content:center}
.dot{width:34px;height:34px;border-radius:50%;border:2px solid #CCC8BE;background:#fff;color:#888;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:all .2s}
.dot:hover{transform:scale(1.15);box-shadow:0 0 0 4px rgba(42,97,78,.12)}
.dot.active{border-color:#2A614E;background:#2A614E;color:#fff}

.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:5px;border:2px solid transparent;background:#FAFAF8;cursor:pointer;transition:all .15s}
.check-item:hover{background:#F7F5F0}
.check-item.active{border-color:#2A614E;background:#F0FAF4}
.checkbox{width:20px;height:20px;border-radius:5px;border:2px solid #CCC;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-item.active .checkbox{border-color:#2A614E;background:#2A614E}

.voice-wrap{position:relative}
.voice-area{width:100%;padding:10px 46px 10px 12px;border-radius:10px;border:2px solid #DDD8CE;font-size:13px;font-family:'DM Sans',sans-serif;background:#FAFAF8;resize:vertical;line-height:1.5;min-height:90px}
.voice-area:focus{outline:none;border-color:#2A614E;box-shadow:0 0 0 3px rgba(42,97,78,.1)}
.voice-area.listening{border-color:#E74C3C;background:#FEF9F9}
.mic-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:#2A614E;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.listening{background:#E74C3C;animation:pulse 1.5s infinite;box-shadow:0 0 0 4px rgba(231,76,60,.25)}
.listen-indicator{display:flex;align-items:center;gap:5px;margin-top:5px}
.listen-dot{width:7px;height:7px;border-radius:50%;background:#E74C3C;animation:pulse 1s infinite}

.info-box{background:#F0FAF4;border-radius:10px;padding:12px 16px;margin-top:20px;border-left:4px solid #2A614E}
.info-box .title{font-size:12px;font-weight:600;color:#2A614E;margin-bottom:3px}
.info-box .desc{font-size:12px;color:#3D5A4C;line-height:1.6}

.voice-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;margin-top:10px;cursor:pointer;transition:all .2s}
.voice-badge.on{background:#2A614E;color:#fff}
.voice-badge.off{background:#E8E4DC;color:#888}

.error-box{margin-top:10px;padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;color:#991B1B;font-size:12px}
.confirm-center{text-align:center;padding:40px 24px}
.confirm-center .emoji{font-size:48px;margin-bottom:14px}
.confirm-center h2{font-family:'Fraunces',serif;font-size:22px;color:#1B4332;margin-bottom:10px}
.confirm-center p{color:#6B7C72;font-size:13px;line-height:1.6;max-width:360px;margin:0 auto}
.confirm-badge{margin-top:24px;padding:10px 16px;background:#F0FAF4;border-radius:10px;display:inline-block;font-size:12px;color:#2A614E}
.mb{margin-bottom:16px}
.mt{margin-top:16px}
.hidden{display:none}
.optional{font-size:11px;color:#AAA;font-weight:400;font-style:italic}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Questionnaire citoyen</h1>
    <div class="sub">ASBL Espoyr — Sprimont</div>
    <div class="progress-bar hidden" id="progressBar">
      <div class="progress-labels"><span id="pageLabel"></span><span id="pctLabel"></span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
</div>

<div class="content">
  <div id="app" class="fade-in"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEk376L6wvSnIhnPYOvAv95XpZV30ENBpfckIKHu7tpZJmYCvpHXJZMh6fOL29gU7-/exec";

const SECTIONS = [
  {id:"profil",title:"Quelques informations",subtitle:"Facultatif",type:"profil"},
  {id:"b1",title:"1. Vie quotidienne et pouvoir d'achat",type:"likert",items:[
    "Je parviens à couvrir mes dépenses courantes sans difficulté",
    "L'évolution du coût de la vie me préoccupe concrètement",
    "Mon pouvoir d'achat alimentaire a diminué ces deux dernières années",
    "Je me sens en sécurité financièrement pour les 12 prochains mois"]},
  {id:"b2",title:"2. Travail et avenir professionnel",type:"likert",items:[
    "Je considère mon emploi ou mon activité comme stable",
    "Le marché du travail local offre suffisamment d'opportunités",
    "Les nouvelles technologies menacent certains métiers autour de moi",
    "Je pense que les jeunes de ma région trouvent du travail facilement"]},
  {id:"b3",title:"3. Avenir des enfants et des jeunes",type:"likert",items:[
    "Les enfants de ma région reçoivent une éducation de qualité",
    "Les jeunes auront plus de difficultés que ma génération à s'installer",
    "L'accès au logement est devenu un obstacle réel pour les jeunes ici",
    "Je suis confiant dans les perspectives d'avenir de la prochaine génération"]},
  {id:"b4",title:"4. Retraite et protection sociale",type:"likert",items:[
    "Je fais confiance au système de pension pour assurer ma retraite",
    "Le montant futur des pensions m'inquiète",
    "Les personnes âgées de mon entourage sont correctement protégées",
    "Je doute de la viabilité à long terme de notre sécurité sociale"]},
  {id:"b5",title:"5. Ressources et autonomie locale",type:"likert",items:[
    "L'accès à l'énergie me semble garanti pour les années à venir",
    "La disparition d'agriculteurs locaux me préoccupe",
    "Notre région est trop dépendante de ressources extérieures",
    "Les infrastructures locales répondent à mes besoins"]},
  {id:"b6",title:"6. Environnement et cadre de vie",type:"likert",items:[
    "La qualité de vie dans ma commune est satisfaisante",
    "L'environnement naturel autour de chez moi se dégrade",
    "La qualité de l'eau ou de l'air dans ma région m'inquiète",
    "Je constate une perte de biodiversité dans mon environnement proche"]},
  {id:"b7",title:"7. Solidarité et lien social",type:"likert",items:[
    "Je me sens en sécurité dans ma commune",
    "La solidarité entre habitants fonctionne bien là où je vis",
    "Le lien social dans mon quartier ou mon village s'affaiblit",
    "L'accompagnement des personnes vulnérables est suffisant"]},
  {id:"b8",title:"8. Vision générale",type:"likert",items:[
    "Globalement, je suis optimiste pour l'avenir de notre société",
    "Je fais confiance aux institutions pour faire face aux défis actuels",
    "Notre société a historiquement su s'adapter aux crises",
    "Je ressens le besoin d'agir mais je ne sais pas par où commencer"]},
  {id:"engagement",title:"Et après ? Votre envie d'agir",type:"engagement"},
  {id:"ouvertes",title:"Vos réflexions",subtitle:"Exprimez-vous librement",type:"ouvertes"}
];

const ENG_OPTIONS = [
  "Je préfère observer sans m'impliquer pour le moment",
  "Je serais curieux·se de découvrir des initiatives locales",
  "Je participe déjà à des actions collectives dans ma région",
  "Je souhaiterais m'engager davantage si on me montrait comment"
];

const MODE_EMPLOI = "Mode d'emploi. Pour chaque affirmation, indiquez votre degré d'accord de 1 à 5, où 1 signifie non et 5 signifie oui. Il n'y a pas de bonne ou de mauvaise réponse. Vous n'êtes pas obligé de répondre à chaque question. Vous pouvez passer à la suivante avec la flèche. Durée estimée : environ 5 minutes.";

// ─── STATE ───
let page = -1;
let answers = {};
let profil = {age:"",situation:"",codepostal:""};
let engagement = [];
let openQ = {preoccupation:"",initiative:""};
let sending = false;
let currentRecognition = null;
let speaking = false;
let voiceMode = false;
let currentItemIdx = 0; // tracks which likert item is "active"

const app = document.getElementById("app");

// ─── TTS — prefer female voice ───
let frVoices = [];
let selectedVoiceIndex = 0;

function loadVoices() {
  const all = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  frVoices = all.filter(v => v.lang.startsWith("fr"));
  if (frVoices.length === 0) frVoices = all.filter(v => v.lang.includes("fr"));
  if (frVoices.length === 0) return;
  const femaleKw = ["denise","amelie","audrey","virginie","marie","clara","celine","lea","julie","alice","caroline","sara"];
  let found = -1;
  for (let i = 0; i < frVoices.length; i++) {
    const n = frVoices[i].name.toLowerCase();
    if (femaleKw.some(k => n.includes(k))) { found = i; break; }
  }
  if (found < 0) {
    for (let i = 0; i < frVoices.length; i++) {
      const n = frVoices[i].name.toLowerCase();
      if (n.includes("natural") || n.includes("premium") || n.includes("enhanced")) { found = i; break; }
    }
  }
  if (found < 0) {
    const maleNames = ["henri","thomas","nicolas","paul","pierre","jacques","male","homme"];
    for (let i = 0; i < frVoices.length; i++) {
      const n = frVoices[i].name.toLowerCase();
      if (!maleNames.some(m => n.includes(m))) { found = i; break; }
    }
  }
  selectedVoiceIndex = found >= 0 ? found : 0;
}

if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = () => { loadVoices(); renderPage(); };
}

function speak(text, callback) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  loadVoices();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "fr-FR"; u.rate = 0.9;
  if (frVoices.length > 0) u.voice = frVoices[selectedVoiceIndex] || frVoices[0];
  u.onend = () => { speaking = false; renderPage(); if (callback) callback(); };
  speaking = true;
  window.speechSynthesis.speak(u);
  renderPage();
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  speaking = false;
}

// Speak a single likert item
function speakItem(sectionIdx, itemIdx) {
  const sec = SECTIONS[sectionIdx];
  if (!sec || sec.type !== "likert") return;
  if (itemIdx >= sec.items.length) return;
  speak(sec.items[itemIdx]);
}

// Speak section title then first item (for likert) or whole section (for others)
function speakSectionStart(section) {
  if (section.type === "likert") {
    currentItemIdx = 0;
    speak(section.title, () => {
      setTimeout(() => { speakItem(page, 0); scrollToItem(0); }, 200);
    });
  } else if (section.type === "engagement") {
    let text = section.title + ". Plusieurs réponses possibles. ";
    ENG_OPTIONS.forEach((o,i) => { text += (i+1) + ". " + o + ". "; });
    speak(text);
  } else if (section.type === "ouvertes") {
    speak(section.title + ". Première question : Quelle est votre préoccupation principale pour les 5 prochaines années ? Deuxième question : Y a-t-il une initiative locale que vous aimeriez voir naître ?");
  } else if (section.type === "profil") {
    speak(section.title + ". Indiquez votre tranche d'âge, votre situation et votre code postal.");
  }
}

// Read all items at once (manual click on speaker)
function speakAllItems(section) {
  let text = section.title + ". ";
  if (section.type === "likert") {
    section.items.forEach((it, i) => { text += (i+1) + ". " + it + ". "; });
  } else if (section.type === "engagement") {
    text += "Plusieurs réponses possibles. ";
    ENG_OPTIONS.forEach((o,i) => { text += (i+1) + ". " + o + ". "; });
  } else if (section.type === "ouvertes") {
    text += "Première question : Quelle est votre préoccupation principale ? Deuxième question : Y a-t-il une initiative locale que vous aimeriez voir naître ?";
  } else if (section.type === "profil") {
    text += "Indiquez votre tranche d'âge, votre situation et votre code postal.";
  }
  speak(text);
}

function scrollToItem(idx) {
  const el = document.getElementById("likert_" + idx);
  if (el) el.scrollIntoView({behavior:"smooth", block:"center"});
  currentItemIdx = idx;
  renderPage();
}

// Called when user answers a likert item
function answerAndNext(sectionId, itemIdx, value) {
  answers[sectionId + "_" + itemIdx] = value;
  const sec = SECTIONS[page];
  const nextIdx = itemIdx + 1;
  if (sec && sec.type === "likert" && nextIdx < sec.items.length) {
    currentItemIdx = nextIdx;
    renderPage();
    setTimeout(() => {
      scrollToItem(nextIdx);
      if (voiceMode) {
        setTimeout(() => speakItem(page, nextIdx), 150);
      }
    }, 100);
  } else {
    currentItemIdx = itemIdx;
    renderPage();
  }
}

// Skip to next item (arrow button)
function skipToNext(itemIdx) {
  stopSpeaking();
  const sec = SECTIONS[page];
  const nextIdx = itemIdx + 1;
  if (sec && sec.type === "likert" && nextIdx < sec.items.length) {
    currentItemIdx = nextIdx;
    renderPage();
    setTimeout(() => {
      scrollToItem(nextIdx);
      if (voiceMode) {
        setTimeout(() => speakItem(page, nextIdx), 150);
      }
    }, 100);
  }
}

function toggleVoiceMode() {
  voiceMode = !voiceMode;
  if (voiceMode && page >= 0 && page < SECTIONS.length) {
    speakSectionStart(SECTIONS[page]);
  } else {
    stopSpeaking();
  }
  renderPage();
}

// ─── STT ───
function startListeningField(fieldKey) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  stopSpeaking();
  if (currentRecognition) { currentRecognition.stop(); currentRecognition = null; renderPage(); return; }
  const r = new SR();
  r.lang = "fr-FR"; r.continuous = true; r.interimResults = true;
  r._field = fieldKey;
  currentRecognition = r;
  let finalT = openQ[fieldKey] ? openQ[fieldKey] + " " : "";
  r.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalT += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    openQ[fieldKey] = (finalT + interim).trim();
    renderPage();
  };
  r.onerror = () => { currentRecognition = null; renderPage(); };
  r.onend = () => { currentRecognition = null; renderPage(); };
  r.start();
  renderPage();
}

// ─── NAVIGATION ───
function navigate(dir) {
  stopSpeaking();
  if (currentRecognition) { currentRecognition.stop(); currentRecognition = null; }
  app.className = "fade-out";
  setTimeout(() => {
    page += dir;
    currentItemIdx = 0;
    app.className = "fade-in";
    renderPage();
    window.scrollTo({top:0,behavior:"smooth"});
    if (voiceMode && page >= 0 && page < SECTIONS.length) {
      setTimeout(() => speakSectionStart(SECTIONS[page]), 400);
    }
  }, 250);
}

function startSurvey() {
  if (voiceMode) {
    speak(MODE_EMPLOI, () => { navigate(1); });
  } else {
    navigate(1);
  }
}

// ─── SUBMIT ───
async function submitForm() {
  stopSpeaking();
  sending = true; renderPage();
  try {
    await fetch(SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({profil, answers, engagement, openQ})
    });
    app.className = "fade-out";
    setTimeout(() => { page = 99; sending = false; app.className = "fade-in"; renderPage(); }, 250);
  } catch(e) {
    sending = false;
    const eb = document.getElementById("errorBox");
    if (eb) eb.classList.remove("hidden");
    renderPage();
  }
}

// ─── RENDER ───
function renderPage() {
  const totalPages = SECTIONS.length;
  const pb = document.getElementById("progressBar");
  const pf = document.getElementById("progressFill");
  const pl = document.getElementById("pageLabel");
  const pp = document.getElementById("pctLabel");

  if (page >= 0 && page < totalPages) {
    pb.classList.remove("hidden");
    const pct = Math.round(((page+1)/totalPages)*100);
    pl.textContent = (page+1) + " / " + totalPages;
    pp.textContent = pct + "%";
    pf.style.width = pct + "%";
  } else {
    pb.classList.add("hidden");
  }

  // ── INTRO ──
  if (page === -1) {
    app.innerHTML = `
      <div class="card" style="padding:32px 22px">
        <h1 style="font-family:'Fraunces',serif;font-size:24px;color:#1B4332;line-height:1.2;margin-bottom:8px">
          Comment percevez-vous votre avenir et celui de votre région ?
        </h1>
        <p style="color:#6B7C72;font-size:13px;line-height:1.6;margin-top:14px">
          Ce questionnaire anonyme explore vos perceptions sur la vie quotidienne, l'emploi, l'environnement, la solidarité et les perspectives d'avenir.
        </p>
        <div class="info-box">
          <div class="title">Mode d'emploi</div>
          <div class="desc">Pour chaque affirmation, indiquez votre degré d'accord de 1 (Non) à 5 (Oui). Il n'y a pas de bonne ou de mauvaise réponse. <strong>Vous n'êtes pas obligé de répondre à chaque question</strong> — utilisez la flèche ↓ pour passer. Durée : ~5 minutes.</div>
        </div>
        <div style="margin-top:16px;text-align:center">
          <div class="voice-badge ${voiceMode?'on':'off'}" onclick="toggleVoiceMode()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            ${voiceMode ? 'Lecture vocale activée ✓' : 'Activer la lecture vocale'}
          </div>
          ${frVoices.length > 1 && voiceMode ? `<div style="margin-top:6px">
            <select onchange="selectedVoiceIndex=parseInt(this.value)" style="font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid #CCC;background:#fff;color:#2A614E;font-family:'DM Sans',sans-serif;cursor:pointer">
              ${frVoices.map((v,i) => {
                let label = v.name.replace(/Microsoft |Google |Apple /g,'').replace(/ Online| Natural| \(.*\)/g,'');
                if (label.length > 22) label = label.substring(0,22)+'…';
                return '<option value="'+i+'" '+(i===selectedVoiceIndex?'selected':'')+'>'+label+'</option>';
              }).join('')}
            </select>
          </div>` : ''}
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="startSurvey()">Commencer</button>`;
    return;
  }

  // ── CONFIRMATION ──
  if (page === 99) {
    stopSpeaking();
    const count = Object.keys(answers).length;
    const total = SECTIONS.filter(s=>s.type==="likert").reduce((a,s)=>a+s.items.length,0);
    app.innerHTML = `
      <div class="card confirm-center">
        <div class="emoji">🌿</div>
        <h2>Merci pour votre participation !</h2>
        <p>Vos réponses contribueront à une réflexion collective sur l'avenir de notre région.</p>
        <div class="confirm-badge">${count} réponses sur ${total} questions</div>
        <div class="mt">
          <button class="btn btn-primary" onclick="resetAll()">Nouveau questionnaire</button>
        </div>
      </div>`;
    return;
  }

  const sec = SECTIONS[page];
  let html = `<div class="card">`;

  // Section header
  const speakerIcon = speaking
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';

  html += `<div class="section-header">
    <div style="flex:1">
      <h2>${sec.title}</h2>
      ${sec.subtitle ? '<p class="subtitle">'+sec.subtitle+'</p>' : ''}
    </div>
    <button class="speak-btn ${speaking?'speaking':voiceMode?'active':''}" onclick="${speaking?'stopSpeaking();renderPage()':'speakAllItems(SECTIONS['+page+'])'}" title="${speaking?'Arrêter':'Lire toutes les questions'}">
      ${speakerIcon}
    </button>
  </div>`;

  // ── PROFIL ──
  if (sec.type === "profil") {
    html += `<div class="mt">
      <div class="mb"><label class="field-label">Tranche d'âge <span class="optional">(facultatif)</span></label><div class="chip-row">
        ${["18-30","31-45","46-60","61+"].map(a=>`<button class="chip ${profil.age===a?'active':''}" onclick="profil.age='${a}';renderPage()">${a}</button>`).join("")}
      </div></div>
      <div class="mb"><label class="field-label">Situation <span class="optional">(facultatif)</span></label><div class="chip-row">
        ${["Salarié·e","Indépendant·e","Sans emploi","Retraité·e","Étudiant·e","Autre"].map(s=>`<button class="chip chip-sm ${profil.situation===s?'active':''}" onclick="profil.situation='${s}';renderPage()">${s}</button>`).join("")}
      </div></div>
      <div><label class="field-label">Code postal <span class="optional">(facultatif)</span></label>
        <input type="text" class="text-input" value="${profil.codepostal}" oninput="profil.codepostal=this.value" placeholder="ex : 4140" maxlength="5" style="max-width:140px">
      </div>
    </div>`;
  }

  // ── LIKERT ──
  if (sec.type === "likert") {
    html += '<div class="mt">';
    sec.items.forEach((item, idx) => {
      const key = sec.id+"_"+idx;
      const sel = answers[key] || 0;
      const isCurrent = idx === currentItemIdx;
      const isLast = idx === sec.items.length - 1;
      html += `<div class="likert-item ${isCurrent?'current':''}" id="likert_${idx}">
        <div class="likert-top">
          <div class="likert-text">${item}</div>
          ${!isLast ? `<button class="skip-btn" onclick="skipToNext(${idx})" title="Passer à la suivante">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>` : ''}
        </div>
        <div class="likert-scale">
          <span class="scale-label">Non</span>
          <div class="dots">
            ${[1,2,3,4,5].map(v=>`<button class="dot ${sel===v?'active':''}" onclick="answerAndNext('${sec.id}',${idx},${v})">${v}</button>`).join("")}
          </div>
          <span class="scale-label scale-label-r">Oui</span>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // ── ENGAGEMENT ──
  if (sec.type === "engagement") {
    html += `<div class="mt"><p style="font-size:13px;color:#6B7C72;margin-bottom:14px;line-height:1.5">Face aux enjeux identifiés, comment vous situez-vous ? <span class="optional">(plusieurs réponses possibles, facultatif)</span></p>`;
    ENG_OPTIONS.forEach((opt,i) => {
      const active = engagement.includes(opt);
      html += `<div class="check-item ${active?'active':''}" onclick="toggleEng(${i})">
        <div class="checkbox">${active?'<svg width="12" height="9" viewBox="0 0 13 10" fill="none"><path d="M1 5L4.5 8.5L12 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
        <span style="font-size:13px">${opt}</span>
      </div>`;
    });
    html += '</div>';
  }

  // ── OPEN QUESTIONS ──
  if (sec.type === "ouvertes") {
    const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    const isLP = currentRecognition && currentRecognition._field === "preoccupation";
    const isLI = currentRecognition && currentRecognition._field === "initiative";

    html += `<div class="mt">
      <div class="mb">
        <label class="field-label">Quelle est votre préoccupation principale pour les 5 prochaines années ? <span class="optional">(facultatif)</span></label>
        <div class="voice-wrap">
          <textarea class="voice-area ${isLP?'listening':''}" oninput="openQ.preoccupation=this.value" placeholder="Écrivez ou cliquez sur le micro...">${openQ.preoccupation}</textarea>
          ${hasSR ? `<button class="mic-btn ${isLP?'listening':''}" onclick="startListeningField('preoccupation')" title="${isLP?'Arrêter':'Dicter'}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>` : ''}
        </div>
        ${isLP ? '<div class="listen-indicator"><div class="listen-dot"></div><span style="font-size:11px;color:#E74C3C;font-weight:500">Écoute en cours... Cliquez sur le micro pour arrêter</span></div>' : ''}
      </div>
      <div>
        <label class="field-label">Y a-t-il une initiative locale que vous aimeriez voir naître ? <span class="optional">(facultatif)</span></label>
        <div class="voice-wrap">
          <textarea class="voice-area ${isLI?'listening':''}" oninput="openQ.initiative=this.value" placeholder="Une idée, un projet... ou cliquez sur le micro...">${openQ.initiative}</textarea>
          ${hasSR ? `<button class="mic-btn ${isLI?'listening':''}" onclick="startListeningField('initiative')" title="${isLI?'Arrêter':'Dicter'}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>` : ''}
        </div>
        ${isLI ? '<div class="listen-indicator"><div class="listen-dot"></div><span style="font-size:11px;color:#E74C3C;font-weight:500">Écoute en cours...</span></div>' : ''}
      </div>
    </div>`;
  }

  html += `</div>`;

  // Voice mode indicator
  html += `<div style="text-align:center;margin-bottom:10px">
    <div class="voice-badge ${voiceMode?'on':'off'}" onclick="toggleVoiceMode()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      ${voiceMode ? 'Lecture vocale ON' : 'Lecture vocale OFF'}
    </div>
  </div>`;

  // Nav buttons
  html += `<div class="btn-row">
    <button class="btn btn-secondary" onclick="navigate(-1)">← Retour</button>`;
  if (page < SECTIONS.length - 1) {
    html += `<button class="btn btn-primary" onclick="navigate(1)">Suivant →</button>`;
  } else {
    if (sending) {
      html += `<button class="btn btn-primary" style="background:#6B9C8A;cursor:wait" disabled>Envoi...</button>`;
    } else {
      html += `<button class="btn btn-submit" onclick="submitForm()">Envoyer ✓</button>`;
    }
  }
  html += `</div>`;
  html += `<div class="error-box hidden" id="errorBox">Erreur d'envoi. Vérifiez votre connexion.</div>`;

  app.innerHTML = html;
}

// ─── HELPERS ───
function toggleEng(i) {
  const opt = ENG_OPTIONS[i];
  if (engagement.includes(opt)) engagement = engagement.filter(o=>o!==opt);
  else engagement.push(opt);
  renderPage();
}

function resetAll() {
  stopSpeaking();
  if (currentRecognition) { currentRecognition.stop(); currentRecognition = null; }
  page = -1; answers = {}; profil = {age:"",situation:"",codepostal:""};
  engagement = []; openQ = {preoccupation:"",initiative:""};
  sending = false; voiceMode = false; currentItemIdx = 0; renderPage();
}

// ─── INIT ───
renderPage();
</script>
</body>
</html>
